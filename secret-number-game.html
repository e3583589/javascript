<!DOCTYPE html>
<html>
<head>
    <title>Secret Number Game</title>
    <style>
        body {
           background-color: #ffc0cb;
           font-family: Arial, sans-serif;
           text-align: center;
           color: white;
        }

        h1 {
           color: white;
        }

        #result {
           font-size: 24px;
           font-weight: bold;
        }

        #score {
           font-size: 20px;
        }
    </style>

</head>
<body>

    <h1>Secret Number Game</h1>
    <h2 id="result"></h2>
    <p id="score"></p>

    <script>
        // Secret number (between 1-5)
        let secretNumber = 3;

        // Points start at 0
        let points = 0;

        // Ask user for input
        let guess = prompt("Guess my favorite number (1-5):");

        // Loop: keep asking if not a number
        while (isNaN(guess)) {
            guess = prompt("That is not a number. Please enter a number between 1-5:");
        }

        // Convert string to number
        guess = Number(guess);

        // Compare guess to secret number
        if (guess === secretNumber) {
            points = 10;
            document.getElementById("result").textContent = "Congratulations! You guessed correctly!";
        } else {
            document.getElementById("result").textContent = "Sorry, that is not correct.";
        }

        // Display final score
        document.getElementById("score").textContent =
            "Game Over! You earned " + points + " points.";

    </script>

</body>
</html>
