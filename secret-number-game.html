<!DOCTYPE html>
<html>
<head>
    <title>Secret Number Game</title>
    <style>
        body {
           background-color: #ffc0cb;
           font-family: Arial, sans-serif;
           text-align: center;
           color: white;
        }

        h1 {
           color: white;
        }

        #result {
           font-size: 24px;
           font-weight: bold;
        }

        #score {
           font-size: 20px;
        }
    </style>

</head>
<body>

    <h1>Secret Number Game</h1>
    <h2 id="result"></h2>
    <p id="score"></p>

    <script>
        let secretNumber = 3;
        let points = 0;
        let guess;

        // Loop until the correct number is guessed
        while (guess !== secretNumber) {

            guess = prompt("Guess my favorite number (1-5):");
            guess = Number(guess);

            if (isNaN(guess)) {
            alert("That is not a number. Try again.");
            } 
            else if (guess !== secretNumber) {
            alert("Sorry, that is not correct. Try again!");
            }
       }

       // When the loop ends, the guess is correct
       points = 10;

       document.getElementById("result").textContent =
            "Congratulations! You guessed correctly!";

       document.getElementById("score").textContent =
            "Game Over! You earned " + points + " points.";
    </script>

</body>
</html>
